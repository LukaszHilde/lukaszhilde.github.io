document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

wolone: var(--hm-orange) / var(--hm-black) / var(--hm-green-deep) */\n  --hm-accent: var(--hm-orange);\n\n  /* ============ Aliasy semantyczne ============ */\n  /* Tekst */\n  --hm-text:        var(--hm-black);      /* nagłówki, wyróżnienia */\n  --hm-text-lead:   var(--hm-grey-700);   /* akapit prowadzący (lead) */\n  --hm-text-soft:   var(--hm-grey-600);   /* body / opisy kart */\n  --hm-text-muted:  var(--hm-grey-500);   /* stopki, podpisy */\n  --hm-text-faint:  var(--hm-grey-400);   /* „/ 04\", separatory numerów */\n  --hm-text-invert: var(--hm-white);      /* tekst na czerni */\n  --hm-text-invert-soft: var(--hm-grey-300); /* jasny tekst na czerni */\n\n  /* Powierzchnie */\n  --hm-surface:         var(--hm-white);\n  --hm-surface-grey:    var(--hm-grey-100);\n  --hm-surface-dark:    var(--hm-black);\n  --hm-surface-callout: var(--hm-peach);\n\n  /* Linie */\n  --hm-hairline: var(--hm-grey-200);   /* włoskowate linie, ramki kart */\n  --hm-rule:     var(--hm-grey-300);   /* linia mastheadu */\n\n  /* Stany interakcji (dla użycia ekranowego) */\n  --hm-accent-hover: var(--hm-orange-deep);\n  --hm-selection-bg: var(--hm-orange);\n  --hm-selection-fg: var(--hm-white);\n}\n<\u002Fstyle>\n  <style>/* HMDesign — typografia. Wyłącznie Lato (self-hosted).\n   Nagłówki 900, ciasny tracking, wielkość zdaniowa.\n   Eyebrow = UPPERCASE, tracking .16–.18em, pomarańcz.\n   System ma dwie skale rozmiarów: dokument A4 (pt) i deck 16:9 (px).\n   Rozmiary trzymamy przy blokach; tu żyje rodzina, grubości, tracking, interlinia. */\n:root{\n  /* Rodzina */\n  --hm-font: 'Lato', Arial, Helvetica, sans-serif;\n\n  /* Grubości (Lato): light / regular / bold / heavy / black */\n  --hm-fw-light:   300; /* @kind font */\n  --hm-fw-regular: 400; /* @kind font */\n  --hm-fw-bold:    700; /* @kind font */\n  --hm-fw-heavy:   800; /* @kind font */\n  --hm-fw-black:   900; /* @kind font */\n\n  /* Tracking (letter-spacing) */\n  --hm-tracking-h1:      -.025em; /* @kind font */\n  --hm-tracking-h2:      -.01em;  /* @kind font */\n  --hm-tracking-tight:   -.03em;  /* @kind font */\n  --hm-tracking-snug:    -.01em;  /* @kind font */\n  --hm-tracking-eyebrow:  .18em;  /* @kind font */\n  --hm-tracking-label:    .16em;  /* @kind font */\n  --hm-tracking-caps:     .1em;   /* @kind font */\n\n  /* Interlinia */\n  --hm-leading-h1:    1.03; /* @kind font */\n  --hm-leading-h2:    1.08; /* @kind font */\n  --hm-leading-lead:  1.44; /* @kind font */\n  --hm-leading-body:  1.4;  /* @kind font */\n  --hm-leading-tight: 1.2;  /* @kind font */\n\n  /* Skala dokumentu A4 (pt) — referencyjnie */\n  --hm-doc-h1:      25pt;   /* @kind font */\n  --hm-doc-h2:      16pt;   /* @kind font */\n  --hm-doc-lead:    11.4pt; /* @kind font */\n  --hm-doc-body:    8.8pt;  /* @kind font */\n  --hm-doc-small:   7.7pt;  /* @kind font */\n  --hm-doc-eyebrow: 7.7pt;  /* @kind font */\n\n  /* Skala deck 16:9 (px @1920) — referencyjnie */\n  --hm-deck-h1:      82px; /* @kind font */\n  --hm-deck-h2:      44px; /* @kind font */\n  --hm-deck-lead:    23px; /* @kind font */\n  --hm-deck-body:    18px; /* @kind font */\n  --hm-deck-eyebrow: 14px; /* @kind font */\n}\n<\u002Fstyle>\n  <style>/* HMDesign — przestrzeń, geometria i detale konstrukcyjne.\n   System jest print-first (A4, mm); deck 16:9 skaluje te same relacje w px. */\n:root{\n  /* Geometria strony A4 */\n  --hm-page-w:            210mm; /* @kind spacing */\n  --hm-page-h:            297mm; /* @kind spacing */\n  --hm-page-w-landscape:  297mm; /* @kind spacing */\n  --hm-page-h-landscape:  210mm; /* @kind spacing */\n\n  /* Marginesy kolumny treści (top / x / bottom) — wartości wzorcowe */\n  --hm-margin-top:    10mm; /* @kind spacing */\n  --hm-margin-x:      13mm; /* @kind spacing */\n  --hm-margin-bottom: 11mm; /* @kind spacing */\n\n  /* Detale marki */\n  --hm-bar:            2.5mm; /* @kind spacing */\n  --hm-bar-deck:       10px;  /* @kind spacing */\n  --hm-diagonal-angle: 62deg; /* @kind other */\n  --hm-gap: U+02BB-02BC,U+02C6,U+02DA,U+02DC,U+0304,U+0308,U+0329,U+2000-206F,U+20AC,U+2122,U+2191,U+2193,U+2212,U+2215,U+FEFF,U+FFFD}\n/* 700 — latin-ext */\n@font-face{font-family:'Lato';font-style:normal;font-weight:700;font-display:swap;src:url(\"150ad892-80fc-44a8-9d7b-53cfe0884955\") format('woff2');unicode-range:U+0100-02BA,U+02BD-02C5,U+02C7-02CC,U+02CE-02D7,U+02DD-02FF,U+0304,U+0308,U+0329,U+1D00-1DBF,U+1E00-1E9F,U+1EF2-1EFF,U+2020,U+20A0-20AB,U+20AD-20C0,U+2113,U+2C60-2C7F,U+A720-A7FF}\n/* 700 — latin */\n@font-face{font-family:'Lato';font-style:normal;font-weight:700;font-display:swap;src:url(\"a1638975-e941-4381-aa51-0251d7edd974\") format('woff2');unicode-range:U+0000-00FF,U+0131,U+0152-0153,U+02BB-02BC,U+02C6,U+02DA,U+02DC,U+0304,U+0308,U+0329,U+2000-206F,U+20AC,U+2122,U+2191,U+2193,U+2212,U+2215,U+FEFF,U+FFFD}\n/* 900 — latin-ext */\n@font-face{font-family:'Lato';font-style:normal;font-weight:900;font-display:swap;src:url(\"61995080-8feb-4753-a8e3-54915413627c\") format('woff2');unicode-range:U+0100-02BA,U+02BD-02C5,U+02C7-02CC,U+02CE-02D7,U+02DD-02FF,U+0304,U+0308,U+0329,U+1D00-1DBF,U+1E00-1E9F,U+1EF2-1EFF,U+2020,U+20A0-20AB,U+20AD-20C0,U+2113,U+2C60-2C7F,U+A720-A7FF}\n/* 900 — latin */\n@font-face{font-family:'Lato';font-style:normal;font-weight:900;font-display:swap;src:url(\"68bd2694-6d93-4191-9d62-cc75727544b0\") format('woff2');unicode-range:U+0000-00FF,U+0131,U+0152-0153,U+02BB-02BC,U+02C6,U+02DA,U+02DC,U+0304,U+0308,U+0329,U+2000-206F,U+20AC,U+2122,U+2191,U+2193,U+2212,U+2215,U+FEFF,U+FFFD}\n\n/* HMDesign — kolory. Wartości 1:1 z pliku wzorcowego HMDesign v1.0.\n   Zasada: pomarańcz + czerń + biel; szarości pomocnicze; zieleń TYLKO\n   dla wątku „sustainability\". Max ~3 kolory na kompozycję. Bez ciepłych beżów. */\n:root{\n  /* ---- Marka (base) ---- */\n  --hm-orange:      #eb5c25;   /* akcent podstawowy */\n  --hm-orange-deep: #c9481a;   /* hover / press */\n  --hm-black:       #232120;   /* atrament / logotyp */\n  --hm-white:       #ffffff;\n\n  /* ---- Szarości pomocnicze (base) ---- */\n  --hm-grey-700: #48494b;      /* tekst prowadzący / listy */\n  --hm-grey-600: #6a6b6d;      /* miękki atrament (opisy) */\n  --hm-grey-500: #919295;      /* tekst wyciszony / stopki */\n  --hm-grey-400: #b4b5b7;      /* np. „/ 04\" w numerze strony */\n  --hm-grey-300: #d1d3d3;      /* linia mastheadu, jasny tekst na czerni */\n  --hm-grey-200: #e4e5e5;      /* włoskowate linie (hairline) */\n  --hm-grey-100: #f6f7f7;      /* tło kart szarych / nagłówki tabel */\n\n  /* ---- Powierzchnie akcentu (base) ---- */\n  --hm-peach: #fdefe9;         /* tło callout jasnego */\n\n  /* ---- Sustainability — WYŁĄCZNIE ten wątek (base) ---- */\n  --hm-green-deep: #034745;\n  --hm-green:      #12a537;\n\n  /* ---- Akcent dokumentu — podmieniany per dokument ----\n     dozwolone: var(--hm-orange) / var(--hm-black) / var(--hm-green-deep) */\n  --hm-accent: var(--hm-orange);\n\n  /* ============ Aliasy semantyczne ============ */\n  /* Tekst */\n  --hm-text:        var(--hm-black);      /* nagłówki, wyróżnienia */\n  --hm-text-lead:   var(--hm-grey-700);   /* akapit prowadzący (lead) */\n  --hm-text-soft:   var(--hm-grey-600);   /* body / opisy kart */\n  --hm-text-muted:  var(--hm-grey-500);   /* stopki, podpisy */\n  --hm-text-faint:  var(--hm-grey-400);   /* „/ 04\", separatory numerów */\n  --hm-text-invert: var(--hm-white);      /* tekst na czerni */\n  --hm-text-invert-soft: var(--hm-grey-300); /* jasny tekst na czerni */\n\n  /* Powierzchnie */\n  --hm-surface:         var(--hm-white);\n  --hm-surface-grey:    var(--hm-grey-100);\n  --hm-surface-dark:    var(--hm-black);\n  --hm-surface-callout: var(--hm-peach);\n\n  /* Linie */\n  --hm-hairline: var(--hm-grey-200);   /* włoskowate linie, ramki kart */\n  --hm-rule:     var(--hm-grey-300);   /* linia mastheadu */\n\n  /* Stany interakcji (dla użycia ekranowego) */\n  --hm-accent-hover: var(--hm-orange-deep);\n  --hm-selection-bg: var(--hm-orange);\n  --hm-selection-fg: var(--hm-white);\n}\n\n/* HMDesign — typografia. Wyłącznie Lato (self-hosted).\n   Nagłówki 900, ciasny tracking, wielkość zdaniowa.\n   Eyebrow = UPPERCASE, tracking .16–.18em, pomarańcz.\n   System ma dwie skale rozmiarów: dokument A4 (pt) i deck 16:9 (px).\n   Rozmiary trzymamy przy blokach; tu żyje rodzina, grubości, tracking, interlinia. */\n:root{\n  /* Rodzina */\n  --hm-font: 'Lato', Arial, Helvetica, sans-serif;\n\n  /* Grubości (Lato): light / regular / bold / heavy / black */\n  --hm-fw-light:   300; /* @kind font */\n  --hm-fw-regular: 400; /* @kind font */\n  --hm-fw-bold:    700; /* @kind font */\n  --hm-fw-heavy:   800; /* @kind font */\n  --hm-fw-black:   900; /* @kind font */\n\n  /* Tracking (letter-spacing) */\n  --hm-tracking-h1:      -.025em; /* @kind font */\n  --hm-tracking-h2:      -.01em;  /* @kind font */\n  --hm-tracking-tight:   -.03em;  /* @kind font */\n  --hm-tracking-snug:    -.01em;  /* @kind font */\n  --hm-tracking-eyebrow:  .18em;  /* @kind font */\n  --hm-tracking-label:    .16em;  /* @kind font */\n  --hm-tracking-caps:     .1em;   /* @kind font */\n\n  /* Interlinia */\n  --hm-leading-h1:    1.03; /* @kind font */\n  --hm-leading-h2:    1.08; /* @kind font */\n  --hm-leading-lead:  1.44; /* @kind font */\n  --hm-leading-body:  1.4;  /* @kind font */\n  --hm-leading-tight: 1.2;  /* @kind font */\n\n  /* Skala dokumentu A4 (pt) — referencyjnie */\n  --hm-doc-h1:      25pt;   /* @kind font */\n  --hm-doc-h2:      16pt;   /* @kind font */\n  --hm-doc-lead:    11.4pt; /* @kind font */\n  --hm-doc-body:    8.8pt;  /* @kind font */\n  --hm-doc-small:   7.7pt;  /* @kind font */\n  --hm-doc-eyebrow: 7.7pt;  /* @kind font */\n\n  /* Skala deck 16:9 (px @1920) — referencyjnie */\n  --hm-deck-h1:      82px; /* @kind font */\n  --hm-deck-h2:      44px; /* @kind font */\n  --hm-deck-lead:    23px; /* @kind font */\n  --hm-deck-body:    18px; /* @kind font */\n  --hm-deck-eyebrow: 14px; /* @kind font */\n}\n\n/* HMDesign — przestrzeń, geometria i detale konstrukcyjne.\n   System jest print-first (A4, mm); deck 16:9 skaluje te same relacje w px. */\n:root{\n  /* Geometria strony A4 */\n  --hm-page-w:            210mm; /* @kind spacing */\n  --hm-page-h:            297mm; /* @kind spacing */\n  --hm-page-w-landscape:  297mm; /* @kind spacing */\n  --hm-page-h-landscape:  210mm; /* @kind spacing */\n\n  /* Marginesy kolumny treści (top / x / bottom) — wartości wzorcowe */\n  --hm-margin-top:    10mm; /* @kind spacing */\n  --hm-margin-x:      13mm; /* @kind spacing */\n  --hm-margin-bottom: 11mm; /* @kind spacing */\n\n  /* Detale marki */\n  --hm-bar:            2.5mm; /* @kind spacing */\n  --hm-bar-deck:       10px;  /* @kind spacing */\n  --hm-diagonal-angle: 62deg; /* @kind other */\n  --hm-gap:            2.6mm; /* @kind spacing */\n  --hm-radius:         0;     /* @kind radius */\n\n  /* Sygnet / kwadracik przy marce */\n  --hm-brand-square: 3mm;  /* @kind spacing */\n  --hm-square-deck:  13px; /* @kind spacing */\n\n  /* Cień strony (tylko widok ekranowy; druk = brak) */\n  --hm-page-shadow:  0 12px 28px rgba(35, 33, 32, .14); /* @kind shadow */\n  --hm-slide-shadow: 0 14px 40px rgba(0, 0, 0, .45);    /* @kind shadow */\n\n  /* Skala odstępów (px, do użycia ekranowego / komponentów) */\n  --hm-space-1: 4px;  /* @kind spacing */\n  --hm-space-2: 8px;  /* @kind spacing */\n  --hm-space-3: 12px; /* @kind spacing */\n  --hm-space-4: 16px; /* @kind spacing */\n  --hm-space-5: 22px; /* @kind spacing */\n  --hm-space-6: 32px; /* @kind spacing */\n}\n\n<\u002Fstyle>\n  <script src=\"33921ee5-2b4e-45b8-8c04-02127a25ef44\"><\u002Fscript>\n  <style>\n    * { box-sizing: border-box; }\n    html { scroll-behavior: smooth; }\n    body { margin: 0; background: #c9ccce; font-family: 'Lato', Arial, Helvetica, sans-serif; -webkit-font-smoothing: antialiased; }\n    a { color: var(--hm-black); text-decoration: none; }\n    a:hover { color: var(--hm-accent); }\n    ::selection { background: var(--hm-orange); color: #fff; }\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n\n<div style=\"max-width:1120px; margin:26px auto; background:var(--hm-white); box-shadow:0 12px 28px rgba(35,33,32,.14); position:relative;\">\n\n  <div aria-hidden=\"true\" style=\"height:6px; background:var(--hm-accent);\"><\u002Fdiv>\n\n  <nav aria-label=\"Nawigacja\" style=\"display:flex; align-items:center; justify-content:space-between; gap:24px; padding:20px clamp(28px,5vw,64px); border-bottom:1px solid var(--hm-rule);\">\n    <a href=\"#top\" aria-label=\"Hildebrandt Management\" style=\"display:inline-flex;\">\n      <x-import component-from-global-scope=\"HMDesignHildebrandtManagement_c97e05.Wordmark\" from=\"33921ee5-2b4e-45b8-8c04-02127a25ef44#/_ds_bundle.js\" size=\"{{ markSize }}\" hint-size=\"auto,24px\"><\u002Fx-import>\n    <\u002Fa>\n    <div style=\"display:flex; align-items:center; gap:26px; font-size:12px; font-weight:800; letter-spacing:.16em; text-transform:uppercase; color:var(--hm-grey-600);\">\n      <a href=\"#obszary\" style=\"color:inherit;\">Obszary<\u002Fa>\n      <a href=\"#perspektywa\" style=\"color:inherit;\">Perspektywa<\u002Fa>\n      <a href=\"#kontakt\" style=\"color:inherit;\">Kontakt<\u002Fa>\n      <a href=\"https://www.hildebrandtmanagement.com/english/\" style=\"color:inherit;\">EN<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fnav>\n\n  <header id=\"top\" style=\"position:relative; overflow:hidden; padding:clamp(44px,7vw,88px) clamp(28px,5vw,64px) clamp(48px,6vw,72px);\">\n    <x-import component-from-global-scope=\"HMDesignHildebrandtManagement_c97e05.Diagonal\" from=\"33921ee5-2b4e-45b8-8c04-02127a25ef44#/_ds_bundle.js\" position=\"top-right\" size=\"{{ diagSize }}\" hint-size=\"240px,240px\"><\u002Fx-import>\n    <div style=\"position:relative; z-index:2; max-width:900px;\">\n      <div style=\"display:flex; align-items:center; gap:12px; margin-bottom:26px;\">\n        <span aria-hidden=\"true\" style=\"width:36px; height:3px; background:var(--hm-accent);\"><\u002Fspan>\n        <span style=\"font-size:13px; font-weight:800; letter-spacing:.18em; text-transform:uppercase; color:var(--hm-accent);\">AI · dane · budownictwo<\u002Fspan>\n      <\u002Fdiv>\n      <h1 style=\"margin:0; font-family:var(--hm-font); font-weight:900; letter-spacing:-.025em; line-height:1.02; font-size:clamp(46px,8vw,92px); color:var(--hm-black);\">\n        Chroń uwagę.<br><span style=\"color:var(--hm-accent);\">Odzyskaj czas.<\u002Fspan>\n      <\u002Fh1>\n      <p style=\"margin:28px 0 0; max-width:60ch; font-size:clamp(18px,2.2vw,23px); line-height:1.44; color:var(--hm-grey-700);\">\n        AI, dane i efektywność operacyjna w budownictwie — z perspektywy decyzji, kosztów, raportowania i organizacji pracy.\n      <\u002Fp>\n      <div style=\"display:flex; align-items:center; gap:12px; margin-top:32px; font-size:13px; font-weight:800; letter-spacing:.12em; text-transform:uppercase; color:var(--hm-grey-500);\">\n        <span>AI dla budownictwa<\u002Fspan>\n        <span aria-hidden=\"true\" style=\"width:6px; height:6px; background:var(--hm-accent);\"><\u002Fspan>\n        <span style=\"color:var(--hm-black);\">Łukasz Hildebrandt<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <main id=\"main\">\n    <section style=\"padding:clamp(48px,6vw,80px) clamp(28px,5vw,64px); border-top:1px solid var(--hm-hairline);\">\n      <div style=\"display:flex; align-items:center; gap:12px; margin-bottom:24px;\">\n        <span aria-hidden=\"true\" style=\"width:36px; height:3px; background:var(--hm-accent);\"><\u002Fspan>\n        <span style=\"font-size:13px; font-weight:800; letter-spacing:.18em; text-transform:uppercase; color:var(--hm-accent);\">Wprowadzenie<\u002Fspan>\n      <\u002Fdiv>\n      <p style=\"margin:0; max-width:900px; font-family:var(--hm-font); font-weight:900; letter-spacing:-.02em; line-height:1.06; font-size:clamp(28px,4vw,50px); color:var(--hm-black);\">\n        Przestrzeń poświęcona temu, jak nowe technologie mogą wspierać <span style=\"color:var(--hm-accent);\">decyzje, raportowanie, kontrolę kosztów i organizację pracy<\u002Fspan> w budownictwie.\n      <\u002Fp>\n      <p style=\"margin:24px 0 0; max-width:56ch; font-size:17px; line-height:1.5; color:var(--hm-grey-600);\">\n        Obszar rozwijany spokojnie, praktycznie i bez traktowania technologii jako celu samego w sobie.\n      <\u002Fp>\n    <\u002Fsection>\n\n    <section id=\"dlaczego\" style=\"padding:clamp(48px,6vw,80px) clamp(28px,5vw,64px); background:var(--hm-grey-100); border-top:1px solid var(--hm-hairline); border-bottom:1px solid var(--hm-hairline);\">\n      <div style=\"display:flex; gap:clamp(24px,4vw,52px); align-items:flex-start; flex-wrap:wrap;\">\n        <div aria-hidden=\"true\" style=\"flex:0 0 auto; font-family:var(--hm-font); font-weight:900; font-size:clamp(56px,8vw,96px); line-height:.9; color:var(--hm-grey-300);\">01<\u002Fdiv>\n        <div style=\"flex:1 1 520px; min-width:0;\">\n          <div style=\"display:flex; align-items:center; gap:12px; margin-bottom:22px;\">\n            <span aria-hidden=\"true\" style=\"width:36px; height:3px; background:var(--hm-accent);\"><\u002Fspan>\n            <span style=\"font-size:13px; font-weight:800; letter-spacing:.18em; text-transform:uppercase; color:var(--hm-accent);\">Dlaczego to ważne<\u002Fspan>\n          <\u002Fdiv>\n          <h2 style=\"margin:0 0 30px; max-width:18ch; font-family:var(--hm-font); font-weight:900; letter-spacing:-.015em; line-height:1.06; font-size:clamp(30px,4.2vw,58px); color:var(--hm-black);\">\n            Budownictwo ma mnóstwo danych. <span style=\"color:var(--hm-accent);\">Zbyt mało czasu, by je wykorzystać.<\u002Fspan>\n          <\u002Fh2>\n          <p style=\"margin:0 0 16px; max-width:64ch; font-size:17px; line-height:1.5; color:var(--hm-grey-700);\">\n            Każdy projekt generuje dokumenty, tabele kosztów, harmonogramy, protokoły, raporty i korespondencję. Informacja istnieje, ale nie zawsze trafia do właściwej osoby we właściwym momencie.\n          <\u002Fp>\n          <p style=\"margin:0 0 16px; max-width:64ch; font-size:17px; line-height:1.5; color:var(--hm-grey-700);\">\n            Decyzje operacyjne często zapadają na podstawie fragmentu obrazu, bo zebranie pełnego kontekstu trwa zbyt długo. To nie jest wyłącznie problem narzędzi. To problem <strong style=\"color:var(--hm-black); font-weight:800;\">przepływu, struktury, uwagi i czasu<\u002Fstrong>.\n          <\u002Fp>\n          <p style=\"margin:0; max-width:64ch; font-size:17px; line-height:1.5; color:var(--hm-grey-700);\">\n            Dlatego rozmowa o AI w budownictwie jest dla mnie rozmową o skracaniu dystansu między danymi a decyzją — i o ochronie uwagi osób odpowiedzialnych za wyniki.\n          <\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <section id=\"obszary\" style=\"padding:clamp(48px,6vw,80px) clamp(28px,5vw,64px);\">\n      <div style=\"display:flex; align-items:center; gap:12px; margin-bottom:22px;\">\n        <span aria-hidden=\"true\" style=\"width:36px; height:3px; background:var(--hm-accent);\"><\u002Fspan>\n        <span style=\"font-size:13px; font-weight:800; letter-spacing:.18em; text-transform:uppercase; color:var(--hm-accent);\">Obszary, które mnie interesują<\u002Fspan>\n      <\u002Fdiv>\n      <h2 style=\"margin:0 0 44px; max-width:20ch; font-family:var(--hm-font); font-weight:900; letter-spacing:-.015em; line-height:1.06; font-size:clamp(30px,4.2vw,58px); color:var(--hm-black);\">\n        Przecięcie <span style=\"color:var(--hm-accent);\">danych, kosztów, dokumentów i decyzji.<\u002Fspan>\n      <\u002Fh2>\n      <ul style=\"list-style:none; margin:0; padding:0; border-top:1px solid var(--hm-hairline);\">\n        <li style=\"display:grid; grid-template-columns:90px minmax(0,1fr); gap:22px; padding:26px 0; border-bottom:1px solid var(--hm-hairline);\">\n          <span style=\"font-size:13px; font-weight:900; letter-spacing:.1em; color:var(--hm-accent);\">/ 01<\u002Fspan>\n          <div>\n            <div style=\"font-family:var(--hm-font); font-size:clamp(22px,2.6vw,32px); font-weight:900; letter-spacing:-.01em; line-height:1.15; color:var(--hm-black); margin-bottom:8px;\">Raportowanie<\u002Fdiv>\n            <p style=\"margin:0; max-width:70ch; font-size:16px; line-height:1.5; color:var(--hm-grey-600);\">Krótsza droga od surowych danych projektowych do raportu, który wspiera decyzje, a nie tylko opisuje sytuację po fakcie.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fli>\n        <li style=\"display:grid; grid-template-columns:90px minmax(0,1fr); gap:22px; padding:26px 0; border-bottom:1px solid var(--hm-hairline);\">\n          <span style=\"font-size:13px; font-weight:900; letter-spacing:.1em; color:var(--hm-accent);\">/ 02<\u002Fspan>\n          <div>\n            <div style=\"font-family:var(--hm-font); font-size:clamp(22px,2.6vw,32px); font-weight:900; letter-spacing:-.01em; line-height:1.15; color:var(--hm-black); margin-bottom:8px;\">Koszty<\u002Fdiv>\n            <p style=\"margin:0; max-width:70ch; font-size:16px; line-height:1.5; color:var(--hm-grey-600);\">Kontrola budżetu, struktura kosztów, odchylenia i prognozy widoczne wtedy, gdy jest jeszcze czas na reakcję.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fli>\n        <li style=\"display:grid; grid-template-columns:90px minmax(0,1fr); gap:22px; padding:26px 0; border-bottom:1px solid var(--hm-hairline);\">\n          <span style=\"font-size:13px; font-weight:900; letter-spacing:.1em; color:var(--hm-accent);\">/ 03<\u002Fspan>\n          <div>\n            <div style=\"font-family:var(--hm-font); font-size:clamp(22px,2.6vw,32px); font-weight:900; letter-spacing:-.01em; line-height:1.15; color:var(--hm-black); margin-bottom:8px;\">Dokumenty<\u002Fdiv>\n            <p style=\"margin:0; max-width:70ch; font-size:16px; line-height:1.5; color:var(--hm-grey-600);\">Umowy, protokoły, specyfikacje, korespondencja i decyzje zapisane w tekście — miejsca, w których często ukryty jest prawdziwy kontekst.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fli>\n        <li style=\"display:grid; grid-template-columns:90px minmax(0,1fr); gap:22px; padding:26px 0; border-bottom:1px solid var(--hm-hairline);\">\n          <span style=\"font-size:13px; font-weight:900; letter-spacing:.1em; color:var(--hm-accent);\">/ 04<\u002Fspan>\n          <div>\n            <div style=\"font-family:var(--hm-font); font-size:clamp(22px,2.6vw,32px); font-weight:900; letter-spacing:-.01em; line-height:1.15; color:var(--hm-black); margin-bottom:8px;\">Przepływ informacji<\u002Fdiv>\n            <p style=\"margin:0; max-width:70ch; font-size:16px; line-height:1.5; color:var(--hm-grey-600);\">Jak informacja przepływa między biurem, budową, zespołami i interesariuszami — i gdzie najczęściej traci kompletność.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fli>\n        <li style=\"display:grid; grid-template-columns:90px minmax(0,1fr); gap:22px; padding:26px 0; border-bottom:1px solid var(--hm-hairline);\">\n          <span style=\"font-size:13px; font-weight:900; letter-spacing:.1em; color:var(--hm-accent);\">/ 05<\u002Fspan>\n          <div>\n            <div style=\"font-family:var(--hm-font); font-size:clamp(22px,2.6vw,32px); font-weight:900; letter-spacing:-.01em; line-height:1.15; color:var(--hm-black); margin-bottom:8px;\">Decyzje zarządcze<\u002Fdiv>\n            <p style=\"margin:0; max-width:70ch; font-size:16px; line-height:1.5; color:var(--hm-grey-600);\">Co warto zobaczyć, kiedy i w jakiej formie, aby decyzja była szybsza, spokojniejsza i lepiej osadzona w danych.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fli>\n      <\u002Ful>\n    <\u002Fsection>\n\n    <section id=\"perspektywa\" style=\"padding:clamp(48px,6vw,80px) clamp(28px,5vw,64px); background:var(--hm-grey-100); border-top:1px solid var(--hm-hairline); border-bottom:1px solid var(--hm-hairline);\">\n      <div style=\"display:flex; gap:clamp(24px,4vw,52px); align-items:flex-start; flex-wrap:wrap;\">\n        <div aria-hidden=\"true\" style=\"flex:0 0 auto; font-family:var(--hm-font); font-weight:900; font-size:clamp(56px,8vw,96px); line-height:.9; color:var(--hm-grey-300);\">02<\u002Fdiv>\n        <div style=\"flex:1 1 520px; min-width:0;\">\n          <div style=\"display:flex; align-items:center; gap:12px; margin-bottom:22px;\">\n            <span aria-hidden=\"true\" style=\"width:36px; height:3px; background:var(--hm-accent);\"><\u002Fspan>\n            <span style=\"font-size:13px; font-weight:800; letter-spacing:.18em; text-transform:uppercase; color:var(--hm-accent);\">Perspektywa praktyczna<\u002Fspan>\n          <\u002Fdiv>\n          <h2 style=\"margin:0 0 28px; max-width:16ch; font-family:var(--hm-font); font-weight:900; letter-spacing:-.015em; line-height:1.06; font-size:clamp(30px,4.2vw,58px); color:var(--hm-black);\">\n            Nie teoria technologii. <span style=\"color:var(--hm-accent);\">Realia projektów.<\u002Fspan>\n          <\u002Fh2>\n          <p style=\"margin:0 0 16px; max-width:64ch; font-size:17px; line-height:1.5; color:var(--hm-grey-700);\">\n            Patrzę na AI i dane przez pryzmat prawdziwych projektów: budżetów, harmonogramów, zmian zakresu, presji czasu, przepływu informacji i codziennej organizacji pracy.\n          <\u002Fp>\n          <p style=\"margin:0 0 32px; max-width:64ch; font-size:17px; line-height:1.5; color:var(--hm-grey-700);\">\n            Ta perspektywa wynika z wielu lat doświadczenia w projektach budowlanych, zarządzaniu operacyjnym oraz pracy z kosztami, harmonogramami i zespołami.\n          <\u002Fp>\n\n          <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:12px; max-width:920px;\">\n            <div style=\"background:var(--hm-white); border:1px solid var(--hm-hairline); border-top:3px solid var(--hm-accent); padding:16px 18px;\">\n              <div style=\"font-size:12px; font-weight:800; letter-spacing:.11em; text-transform:uppercase; color:var(--hm-accent); margin-bottom:8px;\">Uwaga<\u002Fdiv>\n              <div style=\"font-size:15px; line-height:1.45; color:var(--hm-grey-600);\">Technologia powinna zdejmować obciążenie poznawcze, a nie dokładać kolejny ekran.<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"background:var(--hm-white); border:1px solid var(--hm-hairline); border-top:3px solid var(--hm-accent); padding:16px 18px;\">\n              <div style=\"font-size:12px; font-weight:800; letter-spacing:.11em; text-transform:uppercase; color:var(--hm-accent); margin-bottom:8px;\">Czas<\u002Fdiv>\n              <div style=\"font-size:15px; line-height:1.45; color:var(--hm-grey-600);\">Informacja ma największą wartość, gdy jest dostępna wtedy, gdy decyzja jeszcze się liczy.<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"background:var(--hm-white); border:1px solid var(--hm-hairline); border-top:3px solid var(--hm-accent); padding:16px 18px;\">\n              <div style=\"font-size:12px; font-weight:800; letter-spacing:.11em; text-transform:uppercase; color:var(--hm-accent); margin-bottom:8px;\">Kontekst<\u002Fdiv>\n              <div style=\"font-size:15px; line-height:1.45; color:var(--hm-grey-600);\">Dane bez znajomości realiów projektu łatwo prowadzą do pozornych wniosków.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <blockquote style=\"margin:36px 0 0; max-width:40ch; padding:22px 0 4px 26px; border-left:6px solid var(--hm-accent); font-family:var(--hm-font); font-weight:900; letter-spacing:-.01em; font-size:clamp(24px,3vw,38px); line-height:1.14; color:var(--hm-black);\">\n            Większość technologii w tej branży wygrywa nie funkcjami, lecz dopasowaniem do tego, jak ludzie naprawdę pracują.\n          <\u002Fblockquote>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <section id=\"kontakt\" style=\"padding:clamp(52px,7vw,96px) clamp(28px,5vw,64px);\">\n      <div style=\"position:relative; overflow:hidden; background:var(--hm-black); padding:clamp(32px,5vw,60px);\">\n        <div style=\"position:relative; z-index:2; max-width:760px;\">\n          <div style=\"display:flex; align-items:center; gap:12px; margin-bottom:22px;\">\n            <span aria-hidden=\"true\" style=\"width:36px; height:3px; background:var(--hm-accent);\"><\u002Fspan>\n            <span style=\"font-size:13px; font-weight:800; letter-spacing:.18em; text-transform:uppercase; color:var(--hm-accent);\">Kontakt<\u002Fspan>\n          <\u002Fdiv>\n          <h2 style=\"margin:0 0 18px; max-width:18ch; font-family:var(--hm-font); font-weight:900; letter-spacing:-.015em; line-height:1.06; font-size:clamp(30px,4.2vw,54px); color:var(--hm-white);\">\n            Porozmawiajmy o AI, danych <span style=\"color:var(--hm-accent);\">i budownictwie.<\u002Fspan>\n          <\u002Fh2>\n          <p style=\"margin:0 0 32px; font-size:18px; line-height:1.5; color:var(--hm-grey-300);\">\n            Jeśli ten temat Państwa interesuje — najprościej mailem.\n          <\u002Fp>\n          <div style=\"display:flex; flex-wrap:wrap; align-items:center; gap:14px;\">\n            <a href=\"mailto:kontakt@hildebrandtmanagement.com\" style=\"display:inline-flex; align-items:center; gap:9px; padding:14px 22px; background:var(--hm-accent); color:#fff; font-size:15px; font-weight:800; letter-spacing:.01em;\">\n              <span aria-hidden=\"true\">✉<\u002Fspan> kontakt@hildebrandtmanagement.com\n            <\u002Fa>\n            <a href=\"https://www.linkedin.com/in/lukasz-hildebrandt/\" target=\"_blank\" rel=\"noopener noreferrer\" style=\"display:inline-flex; align-items:center; gap:10px; padding:14px 20px; border:1px solid rgba(255,255,255,.28); color:#fff; font-size:15px; font-weight:800;\">\n              <svg sc-camel-view-box=\"0 0 24 24\" fill=\"currentColor\" width=\"17\" height=\"17\" aria-hidden=\"true\"><path d=\"M20.45 20.45h-3.55v-5.57c0-1.33-.03-3.04-1.85-3.04-1.85 0-2.14 1.45-2.14 2.94v5.67H9.36V9h3.41v1.56h.05c.47-.9 1.64-1.85 3.37-1.85 3.6 0 4.27 2.37 4.27 5.45v6.29zM5.34 7.43a2.06 2.06 0 1 1 0-4.13 2.06 2.06 0 0 1 0 4.13zM7.12 20.45H3.56V9h3.56v11.45zM22.22 0H1.77C.79 0 0 .77 0 1.72v20.56C0 23.23.79 24 1.77 24h20.45c.98 0 1.78-.77 1.78-1.72V1.72C24 .77 23.2 0 22.22 0z\"><\u002Fpath><\u002Fsvg>\n              LinkedIn\n            <\u002Fa>\n            <span style=\"font-size:13px; color:var(--hm-grey-500);\">Rozmowa indywidualna<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n  <\u002Fmain>\n\n  <footer style=\"display:flex; align-items:center; justify-content:space-between; gap:18px; flex-wrap:wrap; padding:22px clamp(28px,5vw,64px); border-top:1px solid var(--hm-hairline); font-size:12px; color:var(--hm-grey-500);\">\n    <span style=\"font-weight:800; color:var(--hm-black);\">© 2026 Hildebrandt Management<\u002Fspan>\n    <span style=\"display:inline-flex; align-items:center; gap:8px;\"><span aria-hidden=\"true\" style=\"width:7px; height:7px; background:var(--hm-accent);\"><\u002Fspan> AI · Dane · Budownictwo<\u002Fspan>\n  <\u002Ffooter>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  renderVals() {\n    return { diagSize: 240, markSize: 22 };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
